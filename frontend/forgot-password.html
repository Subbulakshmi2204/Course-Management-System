<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CourseHub</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="forgot-password.css">
</head>

<body>

<div class="container-fluid p-0">

    <div class="row g-0 min-vh-100">

        <!-- Left Panel -->

        <div class="col-lg-6 d-none d-lg-flex flex-column justify-content-center align-items-center branding-panel position-relative">

            <div class="bg-grid-overlay"></div>

            <div class="glow-circle-1"></div>

            <div class="glow-circle-2"></div>

            <div class="text-center text-white position-relative z-1 px-5">

                <i class="bi bi-key-fill display-1 text-warning"></i>

                <h1 class="fw-bold mt-4">

                    Reset Your Password

                </h1>

                <p class="lead text-white-50">

                    Don't worry! Enter your registered email address and we'll send you a password reset link.

                </p>

            </div>

        </div>

        <!-- Right Panel -->

        <div class="col-lg-6 d-flex align-items-center justify-content-center bg-light-panel p-4">

            <div class="forgot-card shadow rounded-4 bg-white p-5">

                <div class="text-center mb-4">

                    <i class="bi bi-envelope-lock-fill login-icon"></i>

                    <h2 class="fw-bold mt-3">

                        Forgot Password

                    </h2>

                    <p class="text-muted">

                        Enter your email to receive a reset link.

                    </p>

                </div>

                <form>

                    <div class="mb-4">

                        <label class="form-label fw-medium">

                            Email Address

                        </label>

                        <div class="input-group custom-input-group">

                            <span class="input-group-text bg-transparent text-muted">

                                <i class="bi bi-envelope"></i>

                            </span>

                            <input
                                type="email"
                                class="form-control ps-0"
                                placeholder="name@example.com"
                                required>

                        </div>

                    </div>

                    <!-- Updated Button -->

                    <a href="reset-password.html"
                       class="btn btn-primary w-100 btn-glow fw-semibold">

                        <i class="bi bi-send-fill me-2"></i>

                        Send Reset Link

                    </a>

                </form>

                <div class="text-center mt-4">

                    <a href="user-login.html"
                       class="text-decoration-none small">

                        <i class="bi bi-arrow-left me-1"></i>

                        Back to Login

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
