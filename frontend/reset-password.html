<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password - CourseHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="reset-password.css">

</head>

<body>

<div class="container-fluid p-0">

<div class="row g-0 min-vh-100">

<!-- Left Side -->

<div class="col-lg-6 d-none d-lg-flex justify-content-center align-items-center branding-panel position-relative">

<div class="bg-grid-overlay"></div>

<div class="glow-circle-1"></div>

<div class="glow-circle-2"></div>

<div class="text-center text-white position-relative z-1">

<i class="bi bi-shield-lock-fill display-1 text-warning"></i>

<h1 class="fw-bold mt-4">

Create a New Password

</h1>

<p class="lead">

Choose a strong password to keep your account secure.

</p>

</div>

</div>

<!-- Right Side -->

<div class="col-lg-6 d-flex justify-content-center align-items-center bg-light-panel">

<div class="reset-card bg-white rounded-4 shadow p-5">

<div class="text-center mb-4">

<i class="bi bi-key-fill login-icon"></i>

<h2 class="fw-bold mt-3">

Reset Password

</h2>

<p class="text-muted">

Your new password must be different from your previous password.

</p>

</div>

<form>

<div class="mb-3">

<label class="form-label">

New Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-lock"></i>

</span>

<input
type="password"
class="form-control"
placeholder="Enter new password">

</div>

</div>

<div class="mb-4">

<label class="form-label">

Confirm Password

</label>

<div class="input-group">

<span class="input-group-text">

<i class="bi bi-lock-fill"></i>

</span>

<input
type="password"
class="form-control"
placeholder="Confirm password">

</div>

</div>

<button class="btn btn-primary w-100">

<i class="bi bi-check-circle-fill me-2"></i>

Reset Password

</button>

</form>

<div class="text-center mt-4">

<a href="user-login.html">

<i class="bi bi-arrow-left"></i>

Back to Login

</a>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
