<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Course - CourseHub Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #F8FAFC;
            color: #1E293B;
        }

        .navbar-brand {
            color: #2563EB !important;
            font-size: 22px;
            letter-spacing: -0.5px;
        }

        .edit-container {
            max-width: 800px;
            margin: 40px auto;
        }

        .custom-card {
            border: 1px solid #E2E8F0 !important;
            border-radius: 16px;
            background: white;
        }

        .form-label {
            font-weight: 500;
            color: #334155;
            font-size: 0.95rem;
        }

        .form-control, .form-select {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #CBD5E1;
        }

        .form-control:focus, .form-select:focus {
            border-color: #2563EB;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .preview-box {
            background-color: #F1F5F9;
            border-radius: 12px;
            border: 1px dashed #CBD5E1;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        footer {
            background: #1E293B;
            color: white;
            text-align: center;
            padding: 24px;
            margin-top: 80px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-shield-lock-fill text-warning me-2"></i>Admin Dashboard
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-muted d-none d-sm-inline small"><i class="bi bi-person-circle me-1"></i>Admin Session</span>
                <a href="index.html" class="btn btn-outline-danger btn-sm px-3 rounded-pill">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container px-4">
        <div class="edit-container">
            
            <div class="mb-4">
                <a href="courses.html" class="text-decoration-none text-muted small">
                    <i class="bi bi-arrow-left me-1"></i> Back to Courses Selection
                </a>
                <h2 class="fw-bold text-dark mt-2" id="pageTitle">Modify Track Content</h2>
                <p class="text-muted mb-0">Target ID Parameter Scope: <span class="badge bg-secondary" id="idBadge">all</span></p>
            </div>

            <div class="card custom-card shadow-sm p-4 p-md-5">
                <form id="editCourseForm">
                    <div class="row g-4">
                        
                        <div class="col-md-8">
                            <div class="mb-3">
                                <label class="form-label">Course Title</label>
                                <input type="text" class="form-control" id="courseTitleInput" required placeholder="Enter primary track title structure">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Categorization Tag</label>
                                <select class="form-select" id="courseCategorySelect" required>
                                    <option value="web">Web Architecture & Engineering</option>
                                    <option value="ai">Artificial Intelligence Foundations</option>
                                    <option value="ml">Machine Learning Systems</option>
                                    <option value="security">Cyber Security Frameworks</option>
                                    <option value="analytics">Enterprise Data Analytics</option>
                                    <option value="mobile">Mobile Logic Platforms</option>
                                </select>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label">Graphic Cover Asset</label>
                            <div class="preview-box">
                                <img src="" class="preview-img" id="coverPreview" alt="Asset Validation Frame">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Course Duration</label>
                                <input type="text" class="form-control" id="courseDurationInput" required placeholder="e.g., 8 weeks, 3 months">
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Mentor Name</label>
                                <input type="text" class="form-control" id="courseMentorInput" required placeholder="Enter lead instructor name">
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="mb-3">
                                <label class="form-label">Source URL Pathway for Cover Image</label>
                                <input type="url" class="form-control" id="courseImgUrlInput" placeholder="https://domain.com/asset-pathway.png">
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="mb-4">
                                <label class="form-label">Subtext / Track Description Metadata</label>
                                <textarea class="form-control" id="courseDescTextarea" rows="4" required placeholder="Outline module parameters, operational tracks, or prerequisite conditions targeted during initialization."></textarea>
                            </div>
                        </div>

                        <div class="col-12 border-top pt-4 d-flex justify-content-end gap-2">
                            <a href="courses.html" class="btn btn-light px-4 py-2 border rounded-3">Cancel</a>
                            <button type="submit" class="btn btn-primary px-5 py-2 rounded-3">Save Parameter Matrix</button>
                        </div>

                    </div>
                </form>
            </div>

        </div>
    </div>

    <footer>
        <div class="container text-center">
            <p class="mb-0 opacity-75 small">&copy; 2026 Student Course Management System. Secure Administrative Gateway.</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('courseId') || 'all';
            
            document.getElementById('idBadge').innerText = courseId;
            
            const titleMap = {
                'python-masterclass': 'Python Programming Masterclass',
                'fullstack-dev': 'Full Stack Web Development',
                'ai-foundations': 'Artificial Intelligence Foundations',
                'gen-ai': 'Generative AI & Large Language Models',
                'cyber-security': 'Cyber Security & Ethical Hacking',
                'data-analytics': 'Data Science & Analytics BootCamp',
                'cross-platform-mobile': 'Cross-Platform App Development',
                'advanced-mobile': 'Advanced iOS & Android Architecture',
                'reinforcement-learning': 'Deep Reinforcement Learning',
                'nlp': 'Natural Language Processing',
                'mlops': 'Predictive Analytics & ML Ops',
                'devops': 'Cloud Native DevOps Engine'
            };

            const descMap = {
                'python-masterclass': 'Learn basics to building automation workflows and real-world scripting from scratch.',
                'fullstack-dev': 'Master modern front-end layout styling, scalable backend architectures, and production databases.',
                'ai-foundations': 'Deep dive into multi-layered Neural Networks, pattern modeling, and linear automation engines.',
                'gen-ai': 'Explore transformers architectures, structural fine-tuning parameters, prompt workflows, and context window logic.',
                'cyber-security': 'Understand digital architecture weaknesses, network defenses, and threat analysis frameworks.',
                'data-analytics': 'Transform raw enterprise variables into interactive visual matrices using Pandas and Tableau.',
                'cross-platform-mobile': 'Build industry-grade intuitive workflows natively deployment-ready for iOS and Android stores.',
                'advanced-mobile': 'Optimize device performance matrix using asynchronous operations, lifecycle models, and reactive structures.',
                'reinforcement-learning': 'Master decision-making agents using Q-learning, policy gradients, and algorithmic actors.',
                'nlp': 'Construct parsing tokenizers, sequence generation loops, and transformer translation layers.',
                'mlops': 'Implement automation orchestration frameworks, continuous calibration steps, and pipeline monitoring tracking.',
                'devops': 'Deploy production networks using micro-container clusters, orchestration logs, and pipelines.'
            };

            const imgMap = {
                'python-masterclass': 'https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?auto=format&fit=crop&w=600&q=80',
                'fullstack-dev': 'https://images.unsplash.com/photo-1547658719-da2b51169166?auto=format&fit=crop&w=600&q=80',
                'ai-foundations': 'https://lirp.cdn-website.com/de11e97c/dms3rep/multi/opt/AI+FOUNDATIONS-640w.png',
                'gen-ai': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQZ-HU7vvPiM9SBgEhJCRi48tQbm7P-bLf4Yr15IJkEuI0ugjDK8GiNi_E&s=10',
                'cyber-security': 'https://images.unsplash.com/photo-1563986768609-322da13575f3?auto=format&fit=crop&w=600&q=80',
                'data-analytics': 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=600&q=80',
                'cross-platform-mobile': 'https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?auto=format&fit=crop&w=600&q=80',
                'advanced-mobile': 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=600&q=80',
                'reinforcement-learning': 'https://bs-uploads.toptal.io/blackfish-uploads/components/open_graph_image/8958314/og_image/optimized/deep-dive-into-reinforcement-learning-2393e08aa800a4247f6066eee9ba0e8d.png',
                'nlp': 'https://miro.medium.com/1*tjyq7DrWkcK_rgym6YJ1Pw.png',
                'mlops': 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=600&q=80',
                'devops': 'https://images.unsplash.com/photo-1600132806370-bf17e65e942f?auto=format&fit=crop&w=600&q=80'
            };

            const durationMap = {
                'python-masterclass': '6 weeks',
                'fullstack-dev': '12 weeks',
                'ai-foundations': '8 weeks',
                'gen-ai': '4 weeks',
                'cyber-security': '10 weeks',
                'data-analytics': '8 weeks',
                'cross-platform-mobile': '8 weeks',
                'advanced-mobile': '10 weeks',
                'reinforcement-learning': '6 weeks',
                'nlp': '6 weeks',
                'mlops': '8 weeks',
                'devops': '8 weeks'
            };

            const mentorMap = {
                'python-masterclass': 'Dr. Sarah Jenkins',
                'fullstack-dev': 'Alex Rivera',
                'ai-foundations': 'Prof. Alan Turing',
                'gen-ai': 'Dr. Emily Carter',
                'cyber-security': 'Michael Chang',
                'data-analytics': 'Jessica Bliss',
                'cross-platform-mobile': 'David Miller',
                'advanced-mobile': 'Sophia Kwok',
                'reinforcement-learning': 'Dr. Richard Sutton',
                'nlp': 'Dr. Christopher Manning',
                'mlops': 'James Anderson',
                'devops': 'Elena Rostova'
            };

            const currentTitle = titleMap[courseId] || 'New Modular Track';
            const currentDesc = descMap[courseId] || '';
            const currentImg = imgMap[courseId] || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=600&q=80';
            const currentDuration = durationMap[courseId] || '';
            const currentMentor = mentorMap[courseId] || '';

            document.getElementById('pageTitle').innerText = 'Edit: ' + currentTitle;
            document.getElementById('courseTitleInput').value = currentTitle;
            document.getElementById('courseDescTextarea').value = currentDesc;
            document.getElementById('courseImgUrlInput').value = imgMap[courseId] ? currentImg : '';
            document.getElementById('coverPreview').src = currentImg;
            document.getElementById('courseDurationInput').value = currentDuration;
            document.getElementById('courseMentorInput').value = currentMentor;

            const categorySelect = document.getElementById('courseCategorySelect');
            if (['python-masterclass', 'fullstack-dev', 'devops'].includes(courseId)) {
                categorySelect.value = 'web';
            } else if (['ai-foundations', 'gen-ai', 'reinforcement-learning'].includes(courseId)) {
                categorySelect.value = 'ai';
            } else if (['nlp', 'mlops'].includes(courseId)) {
                categorySelect.value = 'ml';
            } else if (['cyber-security'].includes(courseId)) {
                categorySelect.value = 'security';
            } else if (['data-analytics'].includes(courseId)) {
                categorySelect.value = 'analytics';
            } else if (['cross-platform-mobile', 'advanced-mobile'].includes(courseId)) {
                categorySelect.value = 'mobile';
            }
        });

        document.getElementById('courseImgUrlInput').addEventListener('input', function(e) {
            const preview = document.getElementById('coverPreview');
            if(e.target.value.trim() !== '') {
                preview.src = e.target.value;
            } else {
                preview.src = 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=600&q=80';
            }
        });

        document.getElementById('editCourseForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Target matrix changes cached successfully! Redirecting back to inventory board.');
            window.location.href = 'courses.html';
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
